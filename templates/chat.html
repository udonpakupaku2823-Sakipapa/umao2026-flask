<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>チャット</title>

    <style>
        html {
            background-color: lightyellow;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: lightyellow;
        }

        #chat-box {
            background-color: transparent;
            height: 70vh;
            overflow-y: scroll;
            padding: 10px;
        }

        .message {
            margin: 10px 0;
            max-width: 80%;
            padding: 10px;
            border-radius: 10px;
            clear: both;
        }

        .me {
            background-color: #dcf8c6;
            float: right;
        }

        .other {
            background-color: skyblue;
            float: left;
            border: 1px solid #ddd;
        }

        #input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            padding: 10px;
            display: flex;
            flex-direction: column;   /* ← 2段にする */
            gap: 10px;
        }

        /* 1段目（名前 + メッセージ）を横並びにする */
        #input-row {
            display: flex;
            gap: 10px;
        }

        #name {
            width: 4em;
            flex: 0 0 auto;
        }

        #msg {
            flex: 1;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
        }

        /* 送信ボタンは中央に配置 */
        #send-btn {
            display: block;      /* ← 中央寄せの決め手 */
            width: 100%;         /* ← スマホでも確実に中央 */
            padding: 14px;
            font-size: 18px;
            text-align: center;  /* ← ボタン内の文字も中央 */
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .time {
            font-size: 0.7em;
            color: #555;
            float: right;
            margin-top: 4px;
        }

        
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// ページ読み込み時に名前を復元
window.onload = function() {
    const savedName = localStorage.getItem("chatName");
    if (savedName) {
        document.getElementById("name").value = savedName;
    }
};

// Firebase 初期化
const firebaseConfig = {
    apiKey: "{{ FIREBASE_API_KEY }}",
    authDomain: "{{ FIREBASE_AUTH_DOMAIN }}",
    projectId: "{{ FIREBASE_PROJECT_ID }}",
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// メッセージ送信
function sendMessage() {
    const name = document.getElementById("name").value;
    const msg = document.getElementById("msg").value;

    if (!msg || !name) return;

    // 名前を保存（次回から自動入力）
    localStorage.setItem("chatName", name);

    db.collection("chat").add({
        name: name,
        message: msg,
        timestamp: new Date()
    });

    document.getElementById("msg").value = "";
}

// Firestore リアルタイム受信
db.collection("chat")
  .orderBy("timestamp")
  .onSnapshot(snapshot => {
    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML = "";

    const currentName = document.getElementById("name").value;

snapshot.forEach(doc => {
    const data = doc.data();
    const div = document.createElement("div");

    // 時刻の整形（MMDD HH:MM）
    let timeStr = "";
    if (data.timestamp && data.timestamp.toDate) {
        const ts = data.timestamp.toDate();
        const MM = String(ts.getMonth() + 1).padStart(2, '0');
        const DD = String(ts.getDate()).padStart(2, '0');
        const HH = String(ts.getHours()).padStart(2, '0');
        const mm = String(ts.getMinutes()).padStart(2, '0');
        timeStr = `${MM}${DD} ${HH}:${mm}`;
    }

    div.classList.add("message");
    div.classList.add(data.name === currentName ? "me" : "other");

    div.innerHTML = `
        <strong>${data.name}</strong><br>
        ${data.message}<br>
        <span class="time">${timeStr}</span>
    `;

    chatBox.appendChild(div);
});

    chatBox.scrollTop = chatBox.scrollHeight;
});      
</script>

</head>

<body>
    <div id="chat-box"></div>

       <div id="input-row">
           <input id="name" placeholder="名前">
           <input id="msg" placeholder="メッセージ">
       </div>
       <button id="send-btn" onclick="sendMessage()">送信</button>
    </div>
</body>
</html>
