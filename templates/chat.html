<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>チャット</title>
</head>
<body>

<style>
    body {
        background: linear-gradient(
            to bottom,
            #f5e9d4 0%,
            #e8d3b0 40%,
            #d9b98a 100%
        );
        margin: 0;
        font-family: sans-serif;
        text-align: left;
        padding: 20px;
    }

    .chat-box {
        background: rgba(255, 255, 255, 0.8);
        padding: 15px;
        border-radius: 10px;
        max-width: 800px;
        margin-bottom: 20px;
    }

    .back-button {
        display: inline-block;
        padding: 10px 16px;
        background-color: #8b5a2b;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        font-size: 18px;
    }
</style>

<h2>チャット</h2>

<div id="messages" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px;"></div>

<input type="text" id="message-input" placeholder="メッセージを入力" style="width:70%;">
<button onclick="sendMessage()">送信</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA35u3UqBqCufnf0aIUgTaRJNwk85pUrtQ",
    authDomain: "dore-chat-base.firebaseapp.com",
    projectId: "dore-chat-base",
    storageBucket: "dore-chat-base.appspot.com",
    messagingSenderId: "171117636172",
    appId: "1:171117636172:web:fc100e2d5f2d18f6c0a2e9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const nickname = localStorage.getItem("nickname") || "名無し";

// メッセージ読み込み（リアルタイム）
db.collection("chat")
  .orderBy("timestamp")
  .onSnapshot((snapshot) => {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      snapshot.forEach((doc) => {
          const d = doc.data();

          // Firestore timestamp → JS Date
          const time = d.timestamp ? d.timestamp.toDate() : null;

          // 日付（MMDD）と時刻（HH:MM）
          const MM = time ? String(time.getMonth() + 1).padStart(2, "0") : "--";
          const DD = time ? String(time.getDate()).padStart(2, "0") : "--";
          const hh = time ? String(time.getHours()).padStart(2, "0") : "--";
          const mm = time ? String(time.getMinutes()).padStart(2, "0") : "--";

          const timeStr = `${MM}${DD} ${hh}:${mm}`;

          // 自分のメッセージかどうか判定
          const isMine = (d.name === nickname);

          // 色設定
          const bgColor = isMine
              ? "#c49a6c"   // 自分：濃い茶色
              : "#e8d8c3";  // 他人：薄い茶色

          // 吹き出しの位置
          const align = isMine ? "flex-end" : "flex-start";

          box.innerHTML += `
              <div style="
                  display:flex;
                  justify-content:${align};
                  margin-bottom:12px;
              ">
                  <div style="
                      background:${bgColor};
                      padding:10px;
                      border-radius:8px;
                      max-width:70%;
                      color:#000;
                  ">
                      <strong>${d.name}</strong><br>
                      ${d.message}<br>
                      <span style="color:#444; font-size:12px;">${timeStr}</span>
                  </div>
              </div>
          `;
      });
  });

function sendMessage() {
    const msg = document.getElementById("message-input").value;
    if (!msg) return;

    db.collection("chat").add({
        name: nickname,
        message: msg,
        timestamp: new Date()
    });

    document.getElementById("message-input").value = "";
}
</script>

</body>
</html>
