<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャット</title>

    <style>
        body {
            background: linear-gradient(
                to bottom,
                #f5e9d4 0%,
                #e8d3b0 40%,
                #d9b98a 100%
            );
            margin: 0;
            font-family: sans-serif;
            text-align: left;
            padding: 20px;
        }

        .chat-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 10px;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-block;
            padding: 10px 16px;
            background-color: #8b5a2b;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            margin-bottom: 15px;
        }

        #message-input {
            font-size: 22px;
            padding: 10px;
            width: 90%;
            max-width: 500px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-left: 5px;
        }
    </style>
</head>

<body>

<a href="/main" class="back-button">← 戻る</a> 

<h2>チャット</h2>

<div id="messages" style="border:1px solid #ccc; max-height:300px; overflow-y:auto; padding:10px;"></div>

<div style="display:flex; align-items:center; gap:10px;">
    <input type="text" id="message-input" placeholder="メッセージを入力">
    <button onclick="sendMessage()">送信</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA35u3UqBqCufnf0aIUgTaRJNwk85pUrtQ",
    authDomain: "dore-chat-base.firebaseapp.com",
    projectId: "dore-chat-base",
    storageBucket: "dore-chat-base.appspot.com",
    messagingSenderId: "171117636172",
    appId: "1:171117636172:web:fc100e2d5f2d18f6c0a2e9"
};

function getColorFromName(name) {
    // 名前からハッシュ値を作る
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }

    // パステルカラーを生成
    const r = (hash >> 16) & 0xff;
    const g = (hash >> 8) & 0xff;
    const b = hash & 0xff;

    return `rgb(${(r + 255) / 2}, ${(g + 255) / 2}, ${(b + 255) / 2})`;
}

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const nickname = localStorage.getItem("nickname") || "名無し";

// メッセージ読み込み（リアルタイム）
db.collection("chat")
  .orderBy("timestamp")
  .onSnapshot((snapshot) => {
      const box = document.getElementById("messages");

      // ★ まず履歴を全部クリア
      box.innerHTML = "";
  
      // ★ 履歴を全部描画（snapshot.forEach） 
      snapshot.forEach((doc) => {
          const d = doc.data();

          const time = d.timestamp ? d.timestamp.toDate() : null;
          const MM = time ? String(time.getMonth() + 1).padStart(2, "0") : "--";
          const DD = time ? String(time.getDate()).padStart(2, "0") : "--";
          const hh = time ? String(time.getHours()).padStart(2, "0") : "--";
          const mm = time ? String(time.getMinutes()).padStart(2, "0") : "--";
          const timeStr = `${MM}/${DD} ${hh}:${mm}`;

          const isMine = (d.name === nickname);
          const userColor = getColorFromName(d.name);
          const bgColor = isMine ? "#c49a6c" : userColor;
          const align = isMine ? "flex-end" : "flex-start";

          const wrapper = document.createElement("div");
          wrapper.style.display = "flex";
          wrapper.style.justifyContent = align;
          wrapper.style.marginBottom = "12px";

          wrapper.innerHTML = `
              <div style="
                  background:${bgColor};
                  padding:10px;
                  border-radius:8px;
                  max-width:70%;
                  color:#000;
              ">
                  <strong>${d.name}</strong><br>
                  ${d.message}<br>
                  <span style="color:#444; font-size:12px;">${timeStr}</span>
              </div>
          `;

          box.appendChild(wrapper);
      });

      // ★ 最新メッセージへスクロール（確実に効く）
      setTimeout(() => {
          box.scrollTop = box.scrollHeight;
      }, 30);
  });

function sendMessage() {
    const msg = document.getElementById("message-input").value;
    if (!msg) return;

    db.collection("chat").add({
        name: nickname,
        message: msg,
        timestamp: new Date()
    });

    document.getElementById("message-input").value = "";
}



</script>

</body>
</html>
