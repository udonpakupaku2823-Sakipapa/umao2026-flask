<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>単勝予想コンテスト：レース選択</title>

    <style>
        body {
            background: linear-gradient(135deg, #000000 40%, #2b2b2b 60%);
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                120deg,
                rgba(255, 215, 0, 0.08) 0px,
                rgba(255, 215, 0, 0.08) 2px,
                transparent 2px,
                transparent 12px
            );
        }

        button {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            transition: 0.2s;
        }
        button:hover {
            background: linear-gradient(135deg, #ffd700, #daa520);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
            transform: scale(1.05);
        }

        #main-area {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            margin: 40px auto;
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #FFD700;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        /* ホバー時に光る */
        input[type="radio"]:hover {
            box-shadow: 0 0 8px rgba(255,215,0,0.7);
        }

        /* 選択された時の金色の丸 */
        input[type="radio"]:checked::after {
            content: "";
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
        }

        .black-gold-btn {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: #FFD700;
            padding: 10px 22px;
            font-size: 18px;
            border: 2px solid #FFD700;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,215,0,0.4);
            transition: all 0.25s ease;
        }
        .black-gold-btn:hover {
            box-shadow: 0 0 14px rgba(255,215,0,0.8);
            transform: scale(1.04);
        }

    </style>
</head>

<body>

<div id="main-area">

    <button onclick="location.href='/'">戻る</button>
    
    <h2>ＪＲＡ重賞単勝予想コンテスト</h2>

    <div style="margin-top:20px;">
    <h6>【オ ー プ ン 戦】 6/21しらさぎＳ～6/28ラジオＮＩＫＫＥＩ賞　までの４戦<br>
    <h3>【2026年下期大会】</h3>
    <h3>【第１回Ｓｕｍｍｅｒシリーズ】　7/5北九州記念～9/27スプリンターズＳまでの２７戦</h3>
    <h3>【第２回Ａｕｔｕｍｎシリーズ】10/4京都大賞典～12/27有馬記念　までの３４戦</h3><br>
    予想の締め切りはレース当日15:00までとし、それまでは何度変更しても構いません。<br>
    オープン戦の間はシステムテストも兼ねますので期間中の不具合についてはご了承ください。<br></h6>
</div>

    

        <div style="margin-top:20px; display:flex; gap:15px;">
            <!-- 予想するボタン（ゴールド） -->
            <button type="button" onclick="goMarks()" 
                style="
                    background: linear-gradient(135deg, #d4af37, #b8860b);
                    color:#000;
                    font-weight:bold;
                    padding:12px 20px;
                    border:none;
                    border-radius:8px;
                    cursor:pointer;
                    font-size:16px;
                    box-shadow:0 0 10px rgba(255,215,0,0.4);
                    flex:1;
                ">
                わたしの予想入力
            </button>

            <!-- 比較表を見るボタン（シルバー） -->
            <button type="button" onclick="goCompare()"
                style="
                    background: linear-gradient(135deg, #c0c0c0, #8f8f8f);
                    color:#000;
                    font-weight:bold;
                    padding:12px 20px;
                    border:none;
                    border-radius:8px;
                    cursor:pointer;
                    font-size:16px;
                    box-shadow:0 0 10px rgba(200,200,200,0.4);
                    flex:1;
                ">
                みんなの予想比較表
            </button>    

            <!-- レース別個人マーク（明るい緑） -->
            <button type="button" onclick="location.href='/marks_list'"
                style="
                    background: linear-gradient(135deg, #7CFC00, #32CD32);
                    color:#000;
                    font-weight:bold;
                    padding:12px 20px;
                    border:none;
                    border-radius:8px;
                    cursor:pointer;
                    font-size:16px;
                    box-shadow:0 0 10px rgba(144,238,144,0.4);
                    flex:1;
                ">
                レース別個人マーク
            </button>

            <!-- 個人ランキング（明るい青） -->
            <button type="button" onclick="location.href='/ranking'"
                style="
                    background: linear-gradient(135deg, #87CEFA, #1E90FF);
                    color:#000;
                    font-weight:bold;
                    padding:12px 20px;
                    border:none;
                    border-radius:8px;
                    cursor:pointer;
                    font-size:16px;
                    box-shadow:0 0 10px rgba(135,206,250,0.4);
                    flex:1;
                ">
                個人ランキング    
            </button>

        </div>

        <!-- ボタンとの間を広げる -->
        <div style="height: 25px;"></div>

    <form method="POST" action="/contest/go" id="raceForm">    
            {% for r in options %}
            <div style="margin: 10px 0; display:flex; align-items:center; gap:12px;
                        color: {% if r.is_closed %}#888{% else %}#fff{% endif %};">
 
                <!-- ラジオボタンを少し大きく -->
                <input type="radio" id="race{{ r.id }}" name="raceId" value="{{ r.id }}"
                       style="width:26px; height:26px;">

                <!-- レース名の文字を大きく -->
                <label for="race{{ r.id }}" style="cursor:pointer; font-size:20px;">
                    {{ r.date }}：{{ r.name }}
                    {% if r.is_closed %}
                   <span style="color:red; font-weight:bold; font-size:20px;">（済）</span>
                    {% endif %}
                </label>
            </div>
       {% endfor %}
        
    </form>

    <script>
    function goMarks() {
        const selected = document.querySelector('input[name="raceId"]:checked');
        if (!selected) {
            alert("レースを選択してください");
            return;
        }
        const nickname = localStorage.getItem("nickname");
        document.getElementById("raceForm").action =
        `/contest/go?mode=marks&nickname=${nickname}`;
        document.getElementById("raceForm").submit();
    }
   
    function goCompare() {
        const selected = document.querySelector('input[name="raceId"]:checked');
        if (!selected) {
            alert("レースを選択してください");
            return;
        }
        document.getElementById("raceForm").action = "/contest/go?mode=compare";
        document.getElementById("raceForm").submit();
    }
    </script>

</div>

</body>
</html>
