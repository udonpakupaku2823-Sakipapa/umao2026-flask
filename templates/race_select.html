<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レース選択</title>

    <style>
        body {
            background: linear-gradient(135deg, #000000 40%, #2b2b2b 60%);
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                120deg,
                rgba(255, 215, 0, 0.08) 0px,
                rgba(255, 215, 0, 0.08) 2px,
                transparent 2px,
                transparent 12px
            );
        }

        #main-area {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            margin: 40px auto;
        }

        select[name="raceId"] {
            font-size: 15px;
            padding: 10px;
            width: 100%;
            max-width: 200px;   /* ← ここで箱の最大幅を決める */
        }

    </style>

</head>
<body>

<button onclick="history.back()">← 戻る</button>    

<div id="main-area">
    <h2>レースを選択してください</h2>

    <form action="/admin/entry/edit" method="get">
        <select name="raceId">
            {% for r in race_list %}
                <option value="{{ r }}">{{ r }}</option>
            {% endfor %} 
        </select>

        <button type="submit">印をつける</button>
    </form>
</div>

</body>
</html>
