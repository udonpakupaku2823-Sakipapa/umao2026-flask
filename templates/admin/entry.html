<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>STEP2：出走枠登録</title>
</head>
<body>

{% if race %}
<div style="
    background:#000;
    color:#FFD700;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    font-size:20px;
    font-weight:bold;
">
    {{ race.name }}（{{ race.grade }}）
    <br>
    {{ race.date }}　{{ race.course }}
    <br>
    登録頭数：{{ race.horses }}頭
</div>
{% endif %}

<h2>STEP2：出走枠・馬番・馬名登録</h2>

<label>レース選択：</label>
<select id="race-select"></select>
<br><br>

<button id="load-btn">枠番・馬番を生成する</button>

<div id="entry-area"></div>

<button id="save-btn" style="display:none;">保存する</button>

<p id="msg"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
