    <title>レース登録（管理者）</title>

<body>

<h2>STEP1：レース登録</h2>

<label>レース名：</label>
<input type="text" id="race-name"><br><br>

<label>グレード：</label>
<select id="race-grade">
    <option value="G1">G1</option>
    <option value="G2">G2</option>
    <option value="G3">G3</option>
</select><br><br>

<label>日付：</label>
<input type="date" id="race-date"><br><br>

<label>出走頭数：</label>
<input type="number" id="race-num" min="1" max="18"><br><br>

<button id="save-btn">レースを登録する</button>

<p id="msg"></p>
