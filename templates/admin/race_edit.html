<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レース編集</title>
</head>
<body>

<button onclick="history.back()">← 戻る</button>

<h2>レース編集</h2>

<form action="/admin/race_update/{{ race.id }}" method="POST">

    <label>レース名：</label><br>
    <input type="text" name="name" value="{{ race.name }}" required><br><br>

    <label>日付：</label><br>
    <input type="date" name="date" value="{{ race.date }}" required><br><br>

    <label>グレード：</label><br>
    <select name="grade">
        <option value="G1" {% if race.grade == "G1" %}selected{% endif %}>G1</option>
        <option value="G2" {% if race.grade == "G2" %}selected{% endif %}>G2</option>
        <option value="G3" {% if race.grade == "G3" %}selected{% endif %}>G3</option>
    </select><br><br>

    <label>
        <input type="checkbox" name="isOfficial" value="true"
               {% if race.isOfficial %}checked{% endif %}>
        このレースを公式レースとして公開する
    </label><br><br>

    <button type="submit">更新する</button>

</form>

</body>
</html>
