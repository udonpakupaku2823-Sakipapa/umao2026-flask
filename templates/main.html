<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <style>
        body {
            background: linear-gradient(
                to bottom,
                #e8ffe8 0%,
                #d4f7d4 40%,
                #b6e6b6 100%
            );
            margin: 0;
            font-family: sans-serif;
            text-align: left;
            padding-left: 20px;
        }

        .race-img {
            display: block;
            margin: 20px 0;
            width: 100%;
            max-width: 800px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 22px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
        }
        
        #race-select {
            width: 60%;   /* ← 好きな幅に調整できる */
            font-size: 18px;
            padding: 6px 10px;
            height: 40px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .chat-button {
            display: block;
            width: 200px;
            margin: 20px 0;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>

<body>



    <h1>うま王2026</h1>

    <p style="font-size:20px;">レースを選択してください</p>

    <form onsubmit="return false;" 
        style="display:flex; gap:8px; align-items:center; margin-top:20px;">
        <select id="race-select"
            style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
            {% for o in options %}
            <option value="{{o}}">{{o}}</option>
            {% endfor %}
        </select>

        <button type="button" onclick="showRace()"
            style="
                font-size:18px;
                padding:6px 12px;
                height:40px;
                width:80px;      /* ← これが超重要 */
                align-self:flex-start; /* ← 左寄せにする（自然） */
            ">
            表示
        </button>
    </form>

    <h2 id="race-title">{{ race }}</h2>

    <img id="race-img" class="race-img" src="/static/{{ race }}.png">

    <a href="/chat" class="chat-button">チャットへ</a>


</body>
</html>
