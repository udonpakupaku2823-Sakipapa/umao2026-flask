<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <style>
        body {
            background: linear-gradient(
                to bottom,
                #e8ffe8 0%,
                #d4f7d4 40%,
                #b6e6b6 100%
            );
            margin: 0;
            font-family: sans-serif;
            text-align: left;
            padding-left: 20px;
        }

        .race-img {
            display: block;
            margin: 20px 0;
            width: 100%;
            max-width: 800px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 22px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
        }
        
        #race-select {
            width: 60%;   /* ← 好きな幅に調整できる */
            font-size: 18px;
            padding: 6px 10px;
            height: 40px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .chat-button {
            display: block;
            width: 200px;
            margin: 20px 0;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>

<body>
        
    {% if nickname == "うま王" %}
        <div style="margin-top:30px; text-align:center;">
            <a href="/entry" 
               style="display:inline-block; padding:10px 20px; 
                      background:black; color:gold; 
                      border-radius:8px; font-weight:bold;">
                管理者メニュー：出走枠登録
            </a>
        </div>
    {% endif %}

    <h1>うま王2026</h1>

    <a href="/" 
       style="
          display:inline-block;
          padding:8px 16px;
          background:#444;
          color:white;
          border-radius:6px;
          text-decoration:none;
          margin-top:10px;
          font-size:16px;
       ">
       ← INDEXへ戻る
    </a>

    <a href="/chat" class="chat-button"
       style="
          display:inline-block;
          padding:8px 16px;
          background:#4CAF50;
          color:white;
          border-radius:6px;
          text-decoration:none;
          margin-left:10px;
          font-size:16px;
       ">
       チャットへ
    </a>

    <p style="font-size:18px;">登録名：{{ nickname }}</p>

    <p style="font-size:20px;">レースを選択してください</p>

    <form action="/main" method="POST" style="display:flex; gap:10px; align-items:center;">
        <select name="race"
            style="
                height:40px;          /* ボタンと高さを揃える */
                font-size:18px;       /* 文字を大きく */
                padding:4px 8px;
                width:240px;          /* ← 幅を広くする（調整可） */
            ">
            {% for opt in options %}
                <option value="{{ opt }}">{{ opt }}</option>
            {% endfor %}
        </select>

        <button type="submit"
            style="
                font-size:18px;
                padding:6px 12px;
                height:40px;
                width:80px;
                align-self:flex-start;
            ">
            表示
        </button>
    </form>


    <!--<h2 id="race-title">{{ race }}</h2> -->

    

    <script>
    function showRace() {
        const race = document.getElementById("race-select").value;

        // タイトル更新
        document.getElementById("race-title").innerText = race;

        // 画像更新
        document.getElementById("race-img").src = "/static/" + race + ".png";
    }

    </script>
    
    <img id="race-img" class="race-img" src="{{ url_for('static', filename=filename) }}">



</body>
</html>
