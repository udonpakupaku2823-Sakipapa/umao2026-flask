<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ raceId }}：比較表</title>

    <style>
        body {
            background: linear-gradient(135deg, #000000 40%, #2b2b2b 60%);
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        #main-area {
            width: 95%;
            margin: 30px auto;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
        }

        th, td {
            border: 1px solid #FFD700;
            padding: 8px;
            text-align: center;
        }

        th {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000;
            font-weight: bold;
        }

        .vertical-header { 
            writing-mode: vertical-rl;   /* ← 縦書き */
            text-orientation: upright;   /* ← 文字を正立させる */
            padding: 6px 4px;
            /*width: 1px;                   ← 内容にフィットさせる */
            white-space: nowrap;         /* ← 折り返し禁止 */
            background: #000;            /* 黒金テーマに合わせるなら */
            color: #FFD700;
            border: 1px solid #FFD700;
            font-weight: bold;
            font-size: 18px;
        }

        .number {
            width: 32px;
            text-align: center;
        }

        /* 枠番（幅固定） */
        .waku {
            width: 32px;
            text-align: center;
        }

        /* 馬名（最大9文字 → 12文字分で固定） */
        .name {
            width: 140px;
            text-align: left;
            padding-left: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 印欄（参加者）も固定幅にする */
        .mark-col {
            width: 40px;
            text-align: center;
        }

        /* 枠色 */
        .w1 { background:#ffffff; color:#000; }
        .w2 { background:#000000; color:#fff; }
        .w3 { background:#ff0000; color:#fff; }
        .w4 { background:#0000ff; color:#fff; }
        .w5 { background:#ffff00; color:#000; }
        .w6 { background:#008000; color:#fff; }
        .w7 { background:#ffa500; color:#000; }
        .w8 { background:#ff69b4; color:#000; }

        .black-gold-btn {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: #FFD700;
            padding: 10px 22px;
            font-size: 18px;
            border: 2px solid #FFD700;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,215,0,0.4);
            transition: all 0.25s ease;
        }
        .black-gold-btn:hover {
            box-shadow: 0 0 14px rgba(255,215,0,0.8);
            transform: scale(1.04);
        }
        
        table {
            table-layout: fixed;
        }

    </style>

    <!--<button onclick="location.href='/contest'">戻る</button>-->
    <button class="black-gold-btn" onclick="history.back()">戻る</button>

</head>

<body>

<div id="main-area">
    <h2>{{ raceId }}：比較表</h2>

    <table style="table-layout: fixed;">
        <tr>
            <th class="waku">枠</th>
            <th class="number">馬番</th>
            <th class="name">馬名</th>

            {# ★ 参加ユーザーの列ヘッダー #}
            {% for user in users %}
                <th class="vertical-header mark-col">{{ user }}</th>
            {% endfor %}
        </tr>

        {# ★ 馬ごとの行 #}
        {% for h in horses %}
        <tr>
            <!--<td>{{ h.waku }}</td>
            <td>{{ h.number }}</td>
            <td class="name">{{ h.name }}</td> -->

            <td class="waku w{{ h.waku }}">{{ h.waku }}</td>
            <td class="number w{{ h.waku }}">{{ h.number }}</td>
            <td class="name w{{ h.waku }}">{{ h.name }}</td>

            {# ★ 馬名で検索する（ここが最重要） #}
            {% for user in users %}
                <td class="mark-col">
                    {{ predictions[user].get(h.name, "") }}
                </td>
            {% endfor %}

        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
