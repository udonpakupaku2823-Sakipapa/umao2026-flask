<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.05, maximum-scale=1.05">
    <title>うま王2026</title>
</head>
<body>
    <h1>レースを選択してください</h1>

    <p>アクセス数：{{ count }}</p> 

    <form method="POST">
        <select name="race">
            {% for opt in options %}
                <option value="{{ opt }}">{{ opt }}</option>
            {% endfor %}
        </select>
        <button type="submit">表示</button>
    </form>

    {% if filename %}
        <h2>{{ race }}</h2>
        <img src="{{ url_for('static', filename=filename) }}" width="600">
    {% endif %}
</body>
</html>
