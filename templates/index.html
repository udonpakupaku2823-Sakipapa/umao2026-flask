<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
           background: linear-gradient(
                to bottom,
                #e8ffe8 0%,
                #d4f7d4 40%,
                #b6e6b6 100%
            );
            margin: 0;
            font-family: sans-serif;
            text-align: left;
            padding-left: 20px;
        }

        #nickname-area, #main-area {
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 22px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
        }

        #race-select {
            width: 60%;   /* ← 好きな幅に調整できる */
            font-size: 18px;
            padding: 6px 10px;
            height: 40px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .chat-button {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>うま王2026</h1>

    <!-- ① ニックネーム入力エリア -->
    <div id="nickname-area">
        <h4>登録名入れてください（3文字で）</h4>

        <div style="display:flex; gap:10px; align-items:center;">
            <input type="text" id="nickname" maxlength="3" placeholder="うま王"
            style="font-size:22px; padding:10px; width:90%; max-width:70px;">
            
            <button type="button" onclick="registerNickname()"
                style="
                    padding:10px 30px;
                    font-size:18px;
                    border-radius:6px;
                ">
            確認
        </button>
        </div>

        <p id="nick-error" style="color:red; margin-top:10px;"></p>
    </div>

    <!-- ② レース選択エリア -->
    <div id="main-area" style="display:none;">

    <h1>うま王2026</h1>

    <p style="font-size:20px;">レースを選択してください</p>

    <form onsubmit="return false;" 
        style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
        <select id="race-select"
                style="font-size:18px; padding:6px 10px; height:60px;">
            {% for o in options %}
            <option value="{{o}}">{{o}}</option>
            {% endfor %}
        </select>

        <button type="button" onclick="showRace()"
                style="
                    font-size:18px;
                    padding:6px 12px;
                    height:40px;
                    width:80px;      /* ← これが超重要 */
                    align-self:flex-start; /* ← 左寄せにする（自然） */
                ">
            表示
        </button>
    </form>


    <h2 id="race-title">{{ race }}</h2>

    <img id="race-img" class="race-img" src="/static/{{ race }}.png">

    <a href="/chat" class="chat-button">チャットへ</a>

    <div style="text-align:center; margin-top:10px; color:#444; font-size:14px;">
        アクセス数：{{ count }}
    </div>
    </div>



    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <!-- ★★★ JavaScript はここにまとめる（正しい位置） ★★★ -->
    <script>

        /* -------------------------
           初期表示
        ------------------------- */
        window.onload = function() {

            // ★ /main から来た場合は main-area を表示して終了
            if (window.location.pathname.includes("/main")) {
                document.getElementById("nickname-area").style.display = "none";
                document.getElementById("main-area").style.display = "block";
                return;  // ← ここで終了してOK
            }

            document.getElementById("nickname-area").style.display = "block";
            document.getElementById("main-area").style.display = "none";
            //return;

            // 初期画像
            const img = document.getElementById("race-img");
            img.src = "/static/2026うま王.png";

            const title = document.getElementById("race-title");
            title.innerText = "2026年うま王";

            // 既存メンバーの名前を自動入力
            const savedName = localStorage.getItem("nickname");
            if (savedName) {
                document.getElementById("nickname").value = savedName;
            }
        };

        // 既存ニックネームを localStorage から読み込む
        const savedName = localStorage.getItem("nickname");
        if (savedName) {
            document.getElementById("nickname").value = savedName;
        }

        /* -------------------------
           Firebase 設定
        ------------------------- */
        const firebaseConfig = {
            apiKey: "AIzaSyA35u3UqBqCufnf0aIUgTaRJNwk85pUrtQ",
            authDomain: "dore-chat-base.firebaseapp.com",
            projectId: "dore-chat-base",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        /* -------------------------
           ニックネーム登録
        ------------------------- */
        async function registerNickname() {
            console.log("registerNickname 実行された");
            const input = document.getElementById("nickname");
            const name = input.value.trim();
            const error = document.getElementById("nick-error");

            error.style.display = "none";
            error.textContent = "";
            input.style.border = "1px solid #ccc";

            // 空欄チェック
            if (name === "") {
                error.textContent = "登録名を入力してください。";
                error.style.display = "block";
                input.style.border = "2px solid red";
                return;
            }

            // 4文字以上チェック
            if (name.length > 3) {
                error.textContent = "登録名は3文字までです。";
                error.style.display = "block";
                input.style.border = "2px solid red";
                return;
            }

            // Firestore 重複チェック
            const userRef = db.collection("users").doc(name);
            const docSnap = await userRef.get();

            if (docSnap.exists) {
                // 注意喚起は出すけど止めない
                error.textContent = "その登録名は既に使われています（注意）";
                error.style.display = "block";
                input.style.border = "2px solid orange";
                // ★ return しない
            }

            // 保存（新規でも既存でもOK）
            localStorage.setItem("nickname", name);

            // ★ Firestore にも保存（新規のみ）
            if (!docSnap.exists) {
                await userRef.set({ created: new Date() });
            }

            document.getElementById("nickname-area").style.display = "none";
            document.getElementById("main-area").style.display = "block";
        }

        /* -------------------------
           レース表示
        ------------------------- */
        function showRace() {
            const race = document.getElementById("race-select").value;

            document.getElementById("race-title").innerText = race;
            document.getElementById("race-img").src = "/static/" + race + ".png";
        }

        // /main から来た場合は main-area を表示
        //if (window.location.pathname === "/main") {
        //    document.getElementById("nickname-area").style.display = "none";
        //    document.getElementById("main-area").style.display = "block";
        //}

    </script>

</body>
</html>
