        // ★ ① まず最初に「色生成関数」を置く（ここは単独で終わる）
        function getColorFromName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash) % 360;
            return `hsl(${hue}, 70%, 80%)`;
        }

/* -------------------------
   ニックネーム登録
------------------------- */
let duplicateWarningShown = false;  // ← 追加（1回目ストップ用）

async function registerNickname() {
    console.log("registerNickname 実行された");

    const input = document.getElementById("nickname");
    const name = input.value.trim();
    const error = document.getElementById("nick-error");

    error.style.display = "none";
    error.textContent = "";
    input.style.border = "1px solid #ccc";

    // 空欄チェック
    if (name === "") {
        error.textContent = "登録名を入力してください。";
        error.style.display = "block";
        input.style.border = "2px solid red";
        return;
    }

    // 3文字以内
    if (name.length > 3) {
        error.textContent = "登録名は3文字までです。";
        error.style.display = "block";
        input.style.border = "2px solid red";
        return;
    }

    // ★ normalize して比較用に整える（ここだけでOK）
    const savedName = (localStorage.getItem("nickname") || "").trim().normalize();
    const inputName = name.trim().normalize();

    // ★ savedName と入力名が一致しているときだけ既存扱い
    const isExistingUser = (savedName === inputName);

    // ★ 新規ユーザーだけ重複チェック
    if (!isExistingUser) {
        const userRef = db.collection("users").doc(inputName);
        const docSnap = await userRef.get();

        if (docSnap.exists) {
            error.textContent = "その登録名は既に使われています（注意）";
            error.style.display = "block";
            input.style.border = "2px solid orange";
            return;
        }

        // 新規 → Firestore に登録
        await userRef.set({ created: new Date() });
    }

    // ★ 既存 or 新規成功 → localStorage に保存
    localStorage.setItem("nickname", inputName);

    // 画面切り替え
    document.getElementById("nickname-area").style.display = "none";
    document.getElementById("main-area").style.display = "block";

    setInitialImage();
}

}
